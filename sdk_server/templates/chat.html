{% extends 'base.html' %}

{% block head %}
<title>聊天</title>
<!-- 确保已引入 Tailwind CSS -->

<style type="text/tailwindcss">
  @layer utilities {
    /* 自定义工具类，方便复用 */
    .content-auto {
      content-visibility: auto;
    }
    .scrollbar-custom {
      scrollbar-width: thin;
      scrollbar-color: #d1d5db #f9fafb; /* 亮色滚动条 */
    }
    .scrollbar-custom::-webkit-scrollbar {
      width: 6px;
    }
    .scrollbar-custom::-webkit-scrollbar-track {
      background: #f9fafb; /* 亮色滚动条轨道 */
    }
    .scrollbar-custom::-webkit-scrollbar-thumb {
      background: #d1d5db; /* 亮色滚动条滑块 */
      border-radius: 3px;
    }
    .scrollbar-custom::-webkit-scrollbar-thumb:hover {
      background: #b90600; /* hover 保留红色 */
    }
    .chat_message {
      background-image: url("https://t.alcy.cc/ycy");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-opacity: 0.1; /* 背景图透明度 */
    }
    /* 头像容器样式 */
    .avatar-container {
      @apply flex items-center gap-2 mb-1;
    }
    /* 头像样式 */
    .msg-avatar {
      @apply w-8 h-8 rounded-full object-cover border border-gray-200;
    }
    /* 自己消息的头像样式 */
    .message.self .msg-avatar {
      @apply border-[#b90600]/20;
    }
  }
</style>

<script>
  tailwind.config = {
    mode: 'jit', // 关键：启用即时编译，识别@apply中的类
    theme: {
      extend: {},
    }
  }
</script>
{% endblock %}

{% block content %}
<div class="container mx-auto px-2 sm:px-4 lg:px-0 w-full">
  <!-- 聊天区域 -->
  <div class="w-full mt-4">
    <!-- 主容器：亮色背景 + 浅灰色边框 -->
    <div class="bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden">
      <!-- 聊天室标题：亮色标题栏 -->
      <div class="px-4 py-4 bg-gray-50 text-gray-800 border-b border-gray-200 font-medium">
        <i class="layui-icon layui-icon-dialogue mr-2"></i> 聊天室
      </div>
      
      <!-- 聊天内容区域 -->
      <div class="p-0">
        <!-- 消息展示区：亮色背景 -->
        <div id="chat_message" class="h-[calc(100vh-220px)] sm:h-[500px] overflow-y-auto scrollbar-custom p-4 bg-gray-50 border-b border-gray-200">
          <div class="message_list">
            <!-- 消息模板：亮色默认样式（他人消息）- 新增头像 -->
            <div class="message mb-3 px-3 py-2 rounded-lg max-w-[80%] sm:max-w-[400px] min-w-[280px] bg-white text-gray-800 border border-gray-200 hidden" id="msg_id">
              <!-- 头像 + 发送者名称容器 -->
              <div class="avatar-container">
                <!-- 头像 -->
                <img class="msg-avatar" src="/static/img/default_avatar.gif" alt="用户头像" data-avatar="">
                <!-- 发送者名称 -->
                <div class="sender username font-medium text-green-600 text-base"></div>
              </div>
              <!-- 消息内容区 -->
              <div class="msgContent">
                <div class="content"></div>
                <!-- 时间戳：亮色文字 -->
                <div class="time text-xs text-gray-500 mt-1 text-right"></div>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 输入区域：亮色背景 -->
        <div class="p-4 bg-gray-50">
          <!-- 输入框 + 按钮组：响应式布局 -->
          <div class="flex flex-col sm:flex-row gap-3 w-full">
            <!-- 输入框：亮色样式 -->
            <input 
              type="text" 
              id="chat_input" 
              placeholder="输入聊天内容..." 
              autocomplete="off"
              class="flex-1 px-4 py-3 rounded bg-white text-gray-800 border border-gray-200 focus:border-[#b90600] focus:outline-none transition-colors shadow-sm"
            >
            <!-- 按钮组：移动端竖向排列，PC端横向 -->
            <div class="flex flex-col sm:flex-row gap-2">
              <button id="send_msg_button" class="px-4 py-2 bg-[#b90600] hover:bg-[#ff4f4f] text-white rounded transition-colors shadow-sm">
                <i class="layui-icon layui-icon-release mr-1"></i> 发送消息
              </button>
              <button id="send_pic_button" class="px-4 py-2 bg-[#b90600] hover:bg-[#ff4f4f] text-white rounded transition-colors shadow-sm">
                <i class="layui-icon layui-icon-release mr-1"></i> 发送媒体
              </button>
              <button id="recordButton" class="px-4 py-2 bg-[#b90600] hover:bg-[#ff4f4f] text-white rounded transition-colors shadow-sm">
                <i class="layui-icon layui-icon-release mr-1"></i> <span id="recordButtonText">发送语音</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 消息样式：亮色模式适配 -->
<style type="text/tailwindcss">
  @layer utilities {
    /* 消息气泡基础样式 */
    .message {
      @apply mb-3 px-3 py-2 rounded-lg max-w-[80%] sm:max-w-[400px] min-w-[280px] sm:min-w-[300px];
    }
    /* 自己发送的消息：红色背景 + 白色文字（保留品牌色） */
    .message.self {
      @apply ml-auto bg-[#b90600] text-white border border-[#b90600]/20; 
    }
    /* 他人发送的消息：白色背景 + 深灰色文字 + 浅边框 */
    .message.other {
      @apply mr-auto bg-white text-gray-800 border border-gray-200 shadow-sm;
    }
    /* 发送者名称：他人消息用绿色，自己消息用浅蓝 */
    .message .sender {
      @apply font-medium text-green-600 text-base;
    }
    .message.self .sender {
      @apply text-sky-200 font-normal text-left;
    }
    /* 自己消息的头像容器样式调整 */
    .message.self .avatar-container {

    }
    /* 消息内容 */
    .msgContent .content {
      @apply flex items-center justify-center w-full;
    }
    .msgContent .content * {
      @apply w-full rounded-lg;
    }
  }
</style>

<script src="/static/js/chat.js"></script>
{% endblock %}
