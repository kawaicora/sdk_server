{% extends 'base.html' %}

{% block head %}


<title>聊天</title>

<style>
  :root {
    --dark-bg: #1a1a1a;
    --dark-card: #242424;
    --dark-border: #333;
    --dark-text: #e0e0e0;
    --accent-color: #b90600;
    --hover-color: #ff4f4f;
  }
  body {
    background-color: var(--dark-bg) !important;
    color: var(--dark-text) !important;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif !important;
  }
  .layui-btn {
    margin: 10px 10px;
  }
  .layui-nav {
    background-color: var(--dark-card);
    border-radius: 8px;
    margin-bottom: 20px;
  }

  .layui-card {
    background-color: var(--dark-card);
    border: 1px solid var(--dark-border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  .layui-card-header {
    background-color: var(--dark-card);
    color: var(--dark-text);
    border-bottom: 1px solid var(--dark-border);
    padding: 15px;
    font-weight: 500;
  }

   .layui-card-body {
    padding: 0 !important;
   }

  .layui-form-label {
    background-color: var(--dark-card);
    color: var(--dark-text);
    border-color: var(--dark-border);
  }

  .layui-input,
  .layui-select {
    background-color: var(--dark-bg);
    border-color: var(--dark-border);
    color: var(--dark-text);
  }

  .layui-input:focus,
  .layui-select:focus {
    border-color: var(--accent-color);
  }

  .layui-btn {
    background-color: var(--accent-color);
    border-radius: 4px;
  }

  .layui-btn:hover {
    background-color: var(--hover-color);
  }



  /* 聊天区域样式 */
  #chat_message {
    /* height: 300px; */
    height: 100%;
    overflow-y: auto;
    padding: 15px;
    border-radius: 8px;
    background: var(--dark-bg);
    border: 1px solid var(--dark-border);
    margin-bottom: 15px;
  }

  .message {
    margin-bottom: 12px;
    padding: 8px 12px;
    border-radius: 8px;

  }

  .msgContent .content {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .message.self {
    margin-left: auto;
    background-color: var(--accent-color);
    color: white;
    max-width: 400px;
    min-width: 300px;

  }

  .message.other {
    margin-right: auto;
    background-color: var(--dark-card);
    max-width: 400px;
    min-width: 300px;

  }

  .message .sender {
    font-weight: 500;
    margin-bottom: 4px;
    color: #acffc1;
    font-size: 16px;
  }

  .message.self .sender {

    color: #55e5ff;

    font-weight: 400;
    padding: 5px;
    align-self: center;
    text-align-last: auto;
  }

  #chat_input {
    width: 100%;
    padding: 12px;
    border-radius: 4px;
    background: var(--dark-bg);
    color: var(--dark-text);
    border: 1px solid var(--dark-border);
    margin-bottom: 15px;
  }

  .device_button_layout {
    display: flex;

  }


  .msgContent .content * {
    width: 100%;
    border-radius: 8px;
  }


  /* 响应式设计 */
  @media (max-width: 768px) {
    .layui-container {
      width: 100%;
      padding: 0 !important;
    }

    .layui-form-label {
      width: auto;
    }

    .layui-input-block {
      margin-left: 100px;
    }

  }

  /* 滚动条样式 */
  ::-webkit-scrollbar {
    width: 6px;
  }

  ::-webkit-scrollbar-track {
    background: var(--dark-bg);
  }

  ::-webkit-scrollbar-thumb {
    background: var(--dark-border);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent-color);
  }
</style>

  

{% endblock %}




{% block content %}


<div class="layui-container">
  <!-- 聊天区域 -->
  <div class="layui-row">
    <div class="layui-col-xs12">
      <div class="layui-card">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-dialogue"></i> 聊天室
        </div>
        <div class="layui-card-body">
          <div id="chat_message"></div>
          <div class="layui-form">
            <div class="layui-form-item">
              <div class="layui-input-group">
                <input type="text" id="chat_input" placeholder="输入聊天内容..." autocomplete="off" class="layui-input">
                <div class="layui-input-suffix">
                  <button id="send_msg_button" class="layui-btn">
                    <i class="layui-icon layui-icon-release"></i> 发送消息
                  </button>
                  <button id="send_pic_button" class="layui-btn">
                    <i class="layui-icon layui-icon-release"></i> 发送图片/视频/音频
                  </button>
                  <button id="recordButton" class="layui-btn">
                    <i class="layui-icon layui-icon-release"></i> <span id="recordButtonText">发送语音</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/chat.js"></script>
{% endblock %}
