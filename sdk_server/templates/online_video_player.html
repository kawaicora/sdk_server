{% extends 'base.html' %}

{% block head %}


<title>Layui FFmpeg Video Player</title>

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

<script async src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.2/dist/ffmpeg.min.js"></script>
<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    async function loadFFmpeg() {
        await ffmpeg.load();
    }

    async function playVideo() {
        const videoUrl = document.getElementById('video-url').value;
        const videoElement = document.getElementById('video-player');

        if (!ffmpeg.isLoaded()) {
            await loadFFmpeg();
        }

        try {
            ffmpeg.FS('writeFile', 'input', await fetchFile(videoUrl));
            await ffmpeg.run('-i', 'input', '-c', 'copy', 'output.mp4');
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
            const videoObjectUrl = URL.createObjectURL(videoBlob);
            videoElement.src = videoObjectUrl;
            videoElement.play();
        } catch (error) {
            console.error('Error processing video:', error);
        }
    }

    window.onload = loadFFmpeg;
</script>
{% endblock %}


{% block content %}

<div class="layui-container">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <i class="fa-solid fa-video"></i> Layui FFmpeg Video Player
                </div>
                <div class="layui-card-body">
                    <form class="layui-form">
                        <div class="layui-form-item">
                            <label class="layui-form-label">
                                <i class="fa-solid fa-link"></i> Video URL
                            </label>
                            <div class="layui-input-block">
                                <input type="text" id="video-url" placeholder="Enter video URL (supports RTMP)"
                                    class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-input-block">
                                <button class="layui-btn layui-btn-normal" onclick="playVideo()">
                                    <i class="fa-solid fa-play"></i> Play Video
                                </button>
                            </div>
                        </div>
                    </form>
                    <video id="video-player" class="layui-video" width="100%" controls></video>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
