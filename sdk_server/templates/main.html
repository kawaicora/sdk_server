{% extends 'base.html' %}

{% block head %}
<title>视频聊天</title>

<link rel="manifest" href="/static/manifest.webmanifest">

 <script>

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/static/js/ServiceWorker.js'); }
  </script>


<!-- 自定义Tailwind配置（保持主题一致性） -->
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        accent: '#b90600',
        hover: '#ff4f4f',
        card: '#ffffff',
        border: '#e5e7eb',
        text: '#111827',
        bg: '#f9fafb',
      },
      fontFamily: {
        sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Rstatic/oboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'sans-serif'],
      },
    },
  }
}
</script>

<!-- 少量自定义样式（补充Tailwind未覆盖的细节） -->
<style type="text/tailwindcss">
@layer utilities {
  .content-auto {
    content-visibility: auto;
  }
  .device-select-container-mask {
    @apply fixed inset-0 flex items-center justify-center p-0 m-0;
  }
  .select-device-div {
    @apply absolute top-7 left-9 flex items-center justify-center rounded-md bg-white/80 p-1.5 px-2 select-none;
  }
  .select-device-div:hover {
    @apply bg-white/55;
  }
  .video-container {
    @apply relative w-full rounded-lg overflow-hidden bg-black;
  }
  /* 滚动条样式 */
  ::-webkit-scrollbar {
    @apply w-1.5;
  }
  ::-webkit-scrollbar-track {
    @apply bg-bg;
  }
  ::-webkit-scrollbar-thumb {
    @apply bg-border rounded-sm;
  }
  ::-webkit-scrollbar-thumb:hover {
    @apply bg-accent;
  }
  .grid {
    grid-auto-flow: row;
  }

  @media (min-width: 800px) {
    .grid {
      grid-auto-flow: column !important;
    }
  }
  

  .help-layer {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url(/static/img/install_help_image.png) no-repeat center center;
    z-index: 999;
  }
}
</style>
{% endblock %}

{% block content %}
<div class="help-layer hidden"></div>
<div class="container mx-auto w-full h-full">

  <!-- 房间创建 -->
  <div class="create-room-container bg-card w-full h-full hidden">
    
    <div class="mb-4">
      
      <input type="text" id="roomTitle" placeholder="请输入房间标题" autocomplete="off" 
              class="w-full px-3 py-2 border border-border rounded-md bg-white text-text focus:outline-none focus:ring-1 focus:ring-accent focus:border-accent">
    </div>
    <div class="mb-6">
      <button id="createRoomBtn" class="bg-accent hover:bg-hover text-white px-4 py-2 rounded-md transition-colors">
        <i class="fa-solid fa-circle-plus mr-2"></i> 创建房间
      </button>
        <button id="guestRegister" class="bg-accent hover:bg-hover text-white px-4 py-2 rounded-md transition-colors">
        <i class="fa-solid fa-arrows-rotate mr-2"></i> 游客初始化
      </button>
    </div>

  
  </div>



  <!-- 房间列表 -->
  <div class="room-list-container bg-card border border-border rounded-lg w-full h-full  overflow-hidden  hidden">
    
    <div>
      <div>
        <!-- 九宫格房间列表 -->
        <div class="mt-6">
          <!-- <h3 class="text-text font-medium mb-4">
            <i class="fa-solid fa-house mr-2"></i> 现有房间
          </h3>
           -->
          <!-- 九宫格容器 -->
          <div id="roomGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            
            <div class="w-full px-3 py-2 sm:w-1/3 md:w-1/4 p-2.5">
              <!--房间列表-->
            </div>
                                                        
            <!-- 空状态提示 -->
            <div id="emptyRoomTip" class="col-span-full text-center py-10 hidden">
              <i class="fa-solid fa-inbox text-5xl text-border mb-4"></i>
              <p class="text-border">暂无房间，快来创建第一个房间吧～</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="create-room-btn" style="display: flex; align-items: center; justify-content: center; position: fixed; width: 40px; height: 40px; border-radius: 40px; background-color: beige;  right: 20px; bottom: 70px;">
      <i class="fa-solid fa-house-medical"></i>
    </div>
 
  </div>

  <!--聊天区域-->
  <div class="text-chat-container w-full h-full  hidden">
    <div class="max-w-6xl mx-auto w-full h-full">
      <!-- 聊天区域：优化响应式布局，增加阴影层级 -->
      <div class="w-full h-full rounded-xl overflow-hidden border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
        <!-- 聊天室标题栏：优化布局和图标 -->
        <!-- <div class="px-5 py-4 bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
          <div class="flex items-center gap-2 text-gray-800 dark:text-gray-200 font-medium text-lg">
            <i class="fa-solid fa-comments text-primary dark:text-primary-light"></i>
            <span>聊天室</span>
          </div>
          <div class="text-xs text-gray-500 dark:text-gray-400 flex items-center gap-1">
            <i class="fa-solid fa-users"></i>
            <span id="online-count">0 人在线</span>
          </div>
        </div> -->
        
        <!-- 聊天内容区域：优化高度计算和响应式 -->
        <div class="flex flex-col h-full">
          <!-- 消息展示区：优化滚动、内边距和背景 -->
          <div id="chat_message" class="flex-1 overflow-y-auto scrollbar-custom p-4 sm:p-6 chat-bg bg-gray-50 dark:bg-gray-900">
            <div class="message_list space-y-4">
              <!-- 消息模板：优化间距、圆角和样式 -->
              <div class="message mb-4 px-0 sm:px-1 hidden" id="msg_id">

                <!-- 他人消息 -->
                <div class="other-msg flex items-start gap-3 max-w-[80%] sm:max-w-[70%] md:max-w-[60%] mr-auto">
                  <!-- 头像：优化样式和动效 -->
                  <img class="msg-avatar avatar-hover w-9 h-9 rounded-full object-cover border border-gray-200 dark:border-gray-700 flex-shrink-0" 
                      src="/static/img/default_avatar.gif" alt="" data-avatar="">
                  <!-- 消息内容容器 -->
                  <div class="msg-div flex-1">
                    <!-- 发送者名称：优化样式 -->
                    <div class="sender username font-medium text-green-600 dark:text-green-400 text-sm mb-1"></div>
                    <!-- 消息气泡：优化圆角和内边距 -->
                    <div class="msg-bubble bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 border border-gray-200 dark:border-gray-700 rounded-lg rounded-tl-none p-3 shadow-sm">
                      <div class="content"></div>
                      <!-- 时间戳：优化位置和样式 -->
                      <div class="time text-xs text-gray-500 dark:text-gray-400 mt-1 text-right"></div>
                    </div>
                  </div>
                </div>
                <!-- 他人消息 -->
                <!-- 自己消息 -->
                <div class="self-msg flex items-start gap-3 max-w-[80%] sm:max-w-[70%] md:max-w-[60%] ml-auto">
                  <div class="msg-div flex-1 text-right">
                    <div class="sender username font-medium text-sky-200 dark:text-sky-300 text-sm mb-1"></div>
                    <div class="msg-bubble bg-primary text-green border border-primary/20 dark:border-primary/30 rounded-lg rounded-tr-none p-3 shadow-sm">
                      <div class="content"></div>
                      <div class="time text-xs text-gray-200 dark:text-gray-300 mt-1 text-right"></div>
                    </div>
                  </div>
                  <img class="msg-avatar avatar-hover w-9 h-9 rounded-full object-cover border border-primary/20 dark:border-primary/30 flex-shrink-0" 
                      src="/static/img/default_avatar.gif" alt="" data-avatar="">
                </div>
                

              </div>
            </div>
          </div>
          
          <!-- 输入区域：深度优化响应式布局 -->
          <div class="p-4 bg-gray-50 dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700">
            <div class="flex flex-col sm:flex-row gap-3 w-full">
              <!-- 输入框：优化样式和响应式 -->
              <input 
                type="text" 
                id="chat_input" 
                placeholder="输入聊天内容...按Enter发送" 
                autocomplete="off"
                class="flex-1 px-4 py-3 rounded-lg bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 border border-gray-200 dark:border-gray-700 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all shadow-sm"
              >
              <!-- 按钮组：优化布局，使用FA图标，适配移动端 -->
              <div class="flex flex-row sm:flex-row gap-2 justify-center sm:justify-start">
                <!-- 发送消息按钮：FA纸飞机图标 -->
                <button id="send_msg_button" class="w-12 h-12 flex items-center justify-center bg-primary hover:bg-primary-light text-white rounded-lg transition-colors shadow-sm" style="background-color:blanchedalmond">
                  <i class="fa-solid fa-paper-plane text-lg"></i>
                </button>
                <!-- 发送媒体按钮：FA图片图标 -->
                <button id="send_pic_button" class="w-12 h-12 flex items-center  justify-center bg-primary hover:bg-primary-light text-white rounded-lg transition-colors shadow-sm" style="background-color:blanchedalmond">
                  <i class="fa-solid fa-image text-lg"></i>
                </button>
                <!-- 发送语音按钮：FA麦克风图标 -->
                <button id="recordButton" class="w-12 h-12 flex items-center justify-center bg-primary hover:bg-primary-light text-white rounded-lg transition-colors shadow-sm" style="background-color:blanchedalmond">
                  <i class="fa-solid fa-microphone text-lg"></i>
                  <span id="recordButtonText" class="hidden">发送语音</span>
                </button>
              </div>
            </div>
            
            <!-- 辅助提示：新增操作提示，提升用户体验 -->
            <div class="mt-2 text-xs text-gray-500 dark:text-gray-400 flex items-center gap-1">
              <i class="fa-solid fa-circle-info"></i>
              <span>支持发送文字、图片和语音消息</span>
            </div>
          </div>
        </div>
      </div>
    </div>


    <div class="exit-room-btn" style="display: flex; align-items: center; justify-content: center; position: fixed; width: 40px; height: 40px; border-radius: 40px; background-color: beige;  right: 20px; bottom: 70px;">
      <i class="fa-solid fa-right-to-bracket"></i>
    </div>
 
  </div>


  <!-- 视频区域 -->
  <div class="video-chat-container  gap-4  hidden ">
    <div class="bg-card border border-border rounded-lg shadow-md overflow-hidden">
      <!-- <div class="px-6 py-4 border-b border-border flex justify-between items-center">
        <div>
          <i class="fa-solid fa-users text-text mr-2"></i> 连线视频
        </div>
        <button id="leftRoomBtn" class="bg-accent hover:bg-hover text-white px-4 py-2 rounded-md transition-colors">
          <i class="fa-solid fa-arrows-rotate mr-2"></i> 离开房间
        </button>
        
      </div> -->
      <div class="">
        <div id="remoteVideos" class="bg-card px-2 py-2 grid">
          <!-- 远程视频会通过JS动态生成 -->
        </div>
      </div>
    </div>


    <div class="exit-room-btn" style="display: flex; align-items: center; justify-content: center;  position: fixed; width: 40px; height: 40px; border-radius: 40px; background-color: beige;  right: 20px; bottom: 70px;">
      <i class="fa-solid fa-right-to-bracket"></i>
    </div>
 
  </div>

  <!-- 设备控制面板 -->
  <div class="device-select-container-mask hidden">
    <div class="device-select-container w-full max-w-md mx-auto z-50">
      <div class="bg-card border border-border rounded-lg shadow-md overflow-hidden">
        <div class="px-6 py-4 border-b border-border">
          <i class="fa-solid fa-camera text-text mr-2"></i> 设备控制
        </div>
        <div class="px-6 py-4">
          <form class="space-y-4">
            <div>
              <label class="block text-text text-sm font-medium mb-2">摄像头</label>
              <select id="videoSelect" 
                      class="w-full px-3 py-2 border border-border rounded-md bg-white text-text focus:outline-none focus:ring-1 focus:ring-accent focus:border-accent">
              </select>
            </div>
            <div>
              <label class="block text-text text-sm font-medium mb-2">麦克风</label>
              <select id="audioSelect" 
                      class="w-full px-3 py-2 border border-border rounded-md bg-white text-text focus:outline-none focus:ring-1 focus:ring-accent focus:border-accent">
              </select>
            </div>
            <div class="flex justify-end space-x-3">
              <button id="switchBtn" type="button" class="bg-accent hover:bg-hover text-white px-4 py-2 rounded-md transition-colors">
                <i class="fa-solid fa-arrows-rotate mr-2"></i> 切换设备
              </button>
              <button id="capture_screen_button" type="button" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-md transition-colors">
                <i class="fa-solid fa-maximize mr-2"></i> 屏幕共享
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>


  
  <div id="map" class="map-list-container hidden" style="width:100%;height:100%;"></div>
</div>


  <script type="module">
    import Location from "/static/js/Location.js";
    import WebRTC from "/static/js/WebRTC.js";
  </script>


<!--   MAP  Base-->


<link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css">
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

{% endblock %}
