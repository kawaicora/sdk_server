{% extends 'base.html' %}

{% block head %}
<title>登录界面</title>
<style>
    .content-container {
        display: flex;
        min-height: 100vh;
    }

    .login-container {
        margin: auto;
        display: flex;
        background-color: rgba(255, 255, 255, 0.8);
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 30vh;
        flex-direction: column;

    }

    .login-logo {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-logo img {
        width: 100px;
        height: 100px;
    }

    .login-form .layui-form-item {
        margin-bottom: 20px;
    }

    .login-form .layui-input {
        height: 45px;
        border-radius: 5px;
        border: 1px solid #ccc;
        padding-left: 40px;
    }

    .login-form .layui-btn {
        height: 45px;
        line-height: 45px;
        border-radius: 5px;
        background-color: #00a1d6;
        font-size: 16px;
    }

    .login-form .layui-icon {
        position: absolute;
        left: 12px;
        top: 14px;
        color: #999;
        font-size: 18px;
    }

    .login-links {
        text-align: center;
        margin-top: 20px;
    }

    .login-links a {
        color: #666;
        margin: 0 10px;
    }
</style>
{% endblock %}




{% block content %}

<div class="content-container">
    <div class="login-container">
        <div class="login-logo">
            <img src="/static/img/login_logo.png" alt="图标">
        </div>
        <form class="layui-form login-form" action="" autocomplete="on">
            <div class="layui-form-item" style="position: relative;">
                <i class="layui-icon layui-icon-username"></i>
                <input type="text" name="account" placeholder="账号/邮箱" autocomplete="off" class="layui-input">
            </div>
            <div class="layui-form-item" style="position: relative;">
                <i class="layui-icon layui-icon-password"></i>
                <input type="password" name="password" placeholder="密码" autocomplete="off" class="layui-input">
            </div>
            <div class="layui-form-item" style="position: relative;">
                <button class="layui-btn layui-btn-fluid" lay-submit lay-filter="login">登录</button>
            </div>
        </form>
        <div class="login-links">
            <a href="/view/register">注册新账号</a>
            <a href="/view/forget_password">找回密码</a>
        </div>
    </div>


</div>

<!-- 引入 Layui 的 JavaScript 文件 -->

<script>
    layui.use(['form'], function () {
        var form = layui.form;

        // 监听登录表单提交事件
        form.on('submit(login)', function (data) {
            Base.inst().Login(data.field.account, data.field.password);

            return false; // 阻止表单跳转
        });
    });
</script>
{% endblock %}
