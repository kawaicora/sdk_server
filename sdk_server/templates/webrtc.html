{% extends 'base.html' %}

{% block head %}


<title>视频聊天</title>

<style>
  :root {
    --dark-bg: #1a1a1a;
    --dark-card: #242424;
    --dark-border: #333;
    --dark-text: #e0e0e0;
    --accent-color: #b90600;
    --hover-color: #ff4f4f;
  }

  body {
    background-color: var(--dark-bg) !important;
    color: var(--dark-text) !important;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif !important;
  }

  
  .device-select-container-mask {
    position: fixed;
    padding: 0;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
  }


  .device-select-container {
    margin: auto;
    z-index: 999;
  }
  .layui-nav {
    background-color: var(--dark-card);
    border-radius: 8px;
    margin-bottom: 20px;
  }

  .layui-card {
    background-color: var(--dark-card);
    border: 1px solid var(--dark-border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  .layui-card-header {
    background-color: var(--dark-card);
    color: var(--dark-text);
    border-bottom: 1px solid var(--dark-border);
    padding: 15px;
    font-weight: 500;
  }

  .remote-video-lable ,.local-video-lable {

    padding: 0 15px !important;

  }

  .layui-form-label {
    background-color: var(--dark-card);
    color: var(--dark-text);
    border-color: var(--dark-border);
  }

  .layui-input,
  .layui-select {
    background-color: var(--dark-bg);
    border-color: var(--dark-border);
    color: var(--dark-text);
  }

  .layui-input:focus,
  .layui-select:focus {
    border-color: var(--accent-color);
  }

  .layui-btn {
    background-color: var(--accent-color);
    border-radius: 4px;
  }

  .layui-btn:hover {
    background-color: var(--hover-color);
  }

  /* 视频容器样式 */
  .video-container {
    position: relative;
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
  }
  #localVideo {
    object-fit: cover;
    border-radius: 8px;
  }


  #remoteVideos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    /* max-height: 60vh; */
    overflow-y: auto;
    padding: 10px;
  }

  /* 聊天区域样式 */
  #chat_message {
    /* height: 300px; */
    height: 100%;
    overflow-y: auto;
    padding: 15px;
    border-radius: 8px;
    background: var(--dark-bg);
    border: 1px solid var(--dark-border);
    margin-bottom: 15px;
  }

  .message {
    margin-bottom: 12px;
    padding: 8px 12px;
    border-radius: 8px;

  }

  .msgContent .content {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .message.self {
    margin-left: auto;
    background-color: var(--accent-color);
    color: white;
    max-width: 400px;
    min-width: 300px;

  }

  .message.other {
    margin-right: auto;
    background-color: var(--dark-card);
    max-width: 400px;
    min-width: 300px;

  }

  .message .sender {
    font-weight: 500;
    margin-bottom: 4px;
    color: #acffc1;
    font-size: 16px;
  }

  .message.self .sender {

    color: #55e5ff;

    font-weight: 400;
    padding: 5px;
    align-self: center;
    text-align-last: auto;
  }

  #chat_input {
    width: 100%;
    padding: 12px;
    border-radius: 4px;
    background: var(--dark-bg);
    color: var(--dark-text);
    border: 1px solid var(--dark-border);
    margin-bottom: 15px;
  }

  .device_button_layout {
    display: flex;

  }


  .msgContent .content * {
    width: 100%;
    border-radius: 8px;
  }
  .select-device-div {
     display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    top: 30px;
    left: 35px;
    border-radius: 5px;
    background-color: #ffffff80;
    padding: 5px 8px;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
  }
  .select-device-div :hover {
    background-color: #ffffff55;
  }

  /* 响应式设计 */
  @media (max-width: 768px) {
    .layui-container {
      /* padding: 10px; */
      width: 100%;
    }

    .layui-form-label {
      width: auto;
    }

    .layui-input-block {
      margin-left: 100px;
    }

    #remoteVideos {
      grid-template-columns: 1fr;
    }


  }

  /* 滚动条样式 */
  ::-webkit-scrollbar {
    width: 6px;
  }

  ::-webkit-scrollbar-track {
    background: var(--dark-bg);
  }

  ::-webkit-scrollbar-thumb {
    background: var(--dark-border);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent-color);
  }
</style>
{% endblock %}




{% block content %}
<div class="layui-container">


  <!-- 房间选择区域 -->
  <div class="room-select-container layui-row layui-col-space15 hidden">
      <div class="layui-card">
          <div class="layui-card-header">
              <i class="layui-icon layui-icon-group"></i> 房间选择
          </div>
          <div class="layui-card-body">
              <!-- 房间创建输入框 -->
              <div class="layui-form-item">
                  <label class="layui-form-label">房间标题</label>
                  <div class="layui-input-block">
                      <input type="text" id="roomTitle" placeholder="请输入房间标题" autocomplete="off" class="layui-input">
                  </div>
              </div>
              <div class="layui-form-item">
                  <div class="layui-input-block">
                      <button id="createRoomBtn" class="layui-btn">
                          <i class="layui-icon layui-icon-add-circle"></i> 创建房间
                      </button>
                  </div>
              </div>

              <!-- 九宫格房间列表 -->
              <div class="layui-row layui-col-space15" style="margin-top: 20px;">
                  <div class="layui-col-xs12">
                      <h3 style="margin-bottom: 15px; font-weight: 500;">
                          <i class="layui-icon layui-icon-home"></i> 现有房间
                      </h3>
                  </div>
                  
                  <!-- 九宫格容器 -->
                  <div id="roomGrid" class="layui-row layui-col-space15">
                      <!-- 房间卡片示例（实际会通过JS动态生成） -->
                     
  

                      <!-- 空状态提示 -->
                      <div id="emptyRoomTip" class="layui-col-xs12" style="text-align: center; padding: 40px 0; display: none;">
                          <i class="layui-icon layui-icon-empty" style="font-size: 50px; color: var(--dark-border);"></i>
                          <p style="margin-top: 15px; color: var(--dark-border);">暂无房间，快来创建第一个房间吧～</p>
                      </div>
                  </div>
              </div>
          </div>
      </div>
  </div>


  <!-- 视频区域 -->
  <div class="video-chat-container layui-row layui-col-space15 hidden">



    <div class="layui-card">
      <div class="layui-card-header">
        <i class="layui-icon layui-icon-group"></i> 连线视频
      </div>
      <button id="leftRoomBtn" class="layui-btn">
        <i class="layui-icon layui-icon-refresh"></i> 离开房间
      </button>
      <div class="layui-card-body">
        <div id="remoteVideos">
          
        </div>
      </div>
    </div>
  </div>
  <!-- 设备控制面板 -->
  <div class = "device-select-container-mask hidden">

<div class="device-select-container layui-row layui-col-space15">
    <div class="layui-col-xs12">
      <div class="layui-card">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-camera"></i> 设备控制
        </div>
        <div class="layui-card-body">
          <div class="layui-form">
            <div class="layui-form-item">
              <label class="layui-form-label">摄像头</label>
              <div class="layui-input-block">
                <select id="videoSelect" lay-filter="videoSelect"></select>
              </div>
            </div>
            <div class="layui-form-item">
              <label class="layui-form-label">麦克风</label>
              <div class="layui-input-block">
                <select id="audioSelect" lay-filter="audioSelect"></select>
              </div>
            </div>
            <div class="layui-form-item">
              <div class="layui-input-block device_button_layout" style="margin-left: auto;">
                <button id="switchBtn" class="layui-btn">
                  <i class="layui-icon layui-icon-refresh"></i> 切换设备
                </button>
                <button id="capture_screen_button" class="layui-btn layui-btn-normal">
                  <i class="layui-icon layui-icon-screen-full"></i> 屏幕共享
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>
      



  <script src="/static/js/webrtc.js"></script>
  {% endblock %}
