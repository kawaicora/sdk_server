{% extends 'base.html' %}

{% block head %}
<title>视频聊天</title>


<!-- 自定义Tailwind配置（保持主题一致性） -->
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        accent: '#b90600',
        hover: '#ff4f4f',
        card: '#ffffff',
        border: '#e5e7eb',
        text: '#111827',
        bg: '#f9fafb',
      },
      fontFamily: {
        sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'sans-serif'],
      },
    },
  }
}
</script>

<!-- 少量自定义样式（补充Tailwind未覆盖的细节） -->
<style type="text/tailwindcss">
@layer utilities {
  .content-auto {
    content-visibility: auto;
  }
  .device-select-container-mask {
    @apply fixed inset-0 flex items-center justify-center p-0 m-0;
  }
  .select-device-div {
    @apply absolute top-7 left-9 flex items-center justify-center rounded-md bg-white/80 p-1.5 px-2 select-none;
  }
  .select-device-div:hover {
    @apply bg-white/55;
  }
  .video-container {
    @apply relative w-full rounded-lg overflow-hidden bg-black;
  }
  /* 滚动条样式 */
  ::-webkit-scrollbar {
    @apply w-1.5;
  }
  ::-webkit-scrollbar-track {
    @apply bg-bg;
  }
  ::-webkit-scrollbar-thumb {
    @apply bg-border rounded-sm;
  }
  ::-webkit-scrollbar-thumb:hover {
    @apply bg-accent;
  }
}
</style>
{% endblock %}

{% block content %}
<div class="container mx-auto px-4">
  
  <div class="grid grid-cols-1 gap-4 mb-6">
    <!-- 房间选择区域 -->
    <div class="room-select-container bg-card border border-border rounded-lg shadow-md overflow-hidden">
      <div class="px-6 py-4 border-b border-border">
        <i class="fa-solid fa-users text-text mr-2"></i> 房间选择
      </div>
      <div class="px-6 py-4">
        <!-- 房间创建输入框 -->
        <div class="mb-4">
          <label class="block text-text text-sm font-medium mb-2">房间标题</label>
          <input type="text" id="roomTitle" placeholder="请输入房间标题" autocomplete="off" 
                 class="w-full px-3 py-2 border border-border rounded-md bg-white text-text focus:outline-none focus:ring-1 focus:ring-accent focus:border-accent">
        </div>
        <div class="mb-6">
          <button id="createRoomBtn" class="bg-accent hover:bg-hover text-white px-4 py-2 rounded-md transition-colors">
            <i class="fa-solid fa-circle-plus mr-2"></i> 创建房间
          </button>
        </div>

        <!-- 九宫格房间列表 -->
        <div class="mt-6">
          <h3 class="text-text font-medium mb-4">
            <i class="fa-solid fa-house mr-2"></i> 现有房间
          </h3>
          
          <!-- 九宫格容器 -->
          <div id="roomGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- 房间卡片示例（实际会通过JS动态生成） -->
             <div class="w-full sm:w-1/3 md:w-1/4 p-2.5">
              <!-- <div class="bg-card border border-border rounded-lg shadow-md overflow-hidden room-card" data-room-id="room_s_1769946982256">
                  <div class="video-container h-36 relative">
                      <img src="https://picsum.photos/300/200?random=1" alt="房间封面" class="w-full h-full object-cover">
                      <div id="room_s_1769946982256_room_hum_count" class="absolute bottom-1.5 right-1.5 bg-black/50 px-2 py-0.5 rounded-full text-xs text-white">
                          <i class="fa-solid fa-user mr-1"></i> 0
                      </div>
                  </div>
                  <div class="p-2.5 text-center">
                      <h4 class="whitespace-nowrap overflow-hidden text-ellipsis font-medium text-text">测试</h4>
                      <button class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-1 rounded-md text-sm w-4/5 mt-2.5 transition-colors" 
                              onclick="join_room_ex('room_s_1769946982256','测试')">
                          进入房间
                      </button>
                  </div>
              </div>
          </div> -->
            
            <!-- 空状态提示 -->
            <div id="emptyRoomTip" class="col-span-full text-center py-10 hidden">
              <i class="fa-solid fa-inbox text-5xl text-border mb-4"></i>
              <p class="text-border">暂无房间，快来创建第一个房间吧～</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 视频区域 -->
  <div class="video-chat-container grid grid-cols-1 gap-4 hidden">
    <div class="bg-card border border-border rounded-lg shadow-md overflow-hidden">
      <div class="px-6 py-4 border-b border-border flex justify-between items-center">
        <div>
          <i class="fa-solid fa-users text-text mr-2"></i> 连线视频
        </div>
        <button id="leftRoomBtn" class="bg-accent hover:bg-hover text-white px-4 py-2 rounded-md transition-colors">
          <i class="fa-solid fa-arrows-rotate mr-2"></i> 离开房间
        </button>
      </div>
      <div class="px-6 py-4">
        <div id="remoteVideos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 overflow-y-auto p-2.5">
          <!-- 远程视频会通过JS动态生成 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 设备控制面板 -->
  <div class="device-select-container-mask hidden">
    <div class="device-select-container w-full max-w-md mx-auto z-50">
      <div class="bg-card border border-border rounded-lg shadow-md overflow-hidden">
        <div class="px-6 py-4 border-b border-border">
          <i class="fa-solid fa-camera text-text mr-2"></i> 设备控制
        </div>
        <div class="px-6 py-4">
          <form class="space-y-4">
            <div>
              <label class="block text-text text-sm font-medium mb-2">摄像头</label>
              <select id="videoSelect" 
                      class="w-full px-3 py-2 border border-border rounded-md bg-white text-text focus:outline-none focus:ring-1 focus:ring-accent focus:border-accent">
              </select>
            </div>
            <div>
              <label class="block text-text text-sm font-medium mb-2">麦克风</label>
              <select id="audioSelect" 
                      class="w-full px-3 py-2 border border-border rounded-md bg-white text-text focus:outline-none focus:ring-1 focus:ring-accent focus:border-accent">
              </select>
            </div>
            <div class="flex justify-end space-x-3">
              <button id="switchBtn" type="button" class="bg-accent hover:bg-hover text-white px-4 py-2 rounded-md transition-colors">
                <i class="fa-solid fa-arrows-rotate mr-2"></i> 切换设备
              </button>
              <button id="capture_screen_button" type="button" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-md transition-colors">
                <i class="fa-solid fa-maximize mr-2"></i> 屏幕共享
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/webrtc.js"></script>
</div>
{% endblock %}
