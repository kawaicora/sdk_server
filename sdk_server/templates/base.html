<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 依赖引入 -->
    <script src="/static/js/jquery.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script language="javascript" src="/static/js/jsencrypt.min.js"></script>
    <script src="/static/js/socket.io.js"></script>
    <script language="javascript" src="/static/js/CommonUtils.js"></script>
    <script language="javascript" src="/static/js/LoggerManager.js"></script>
    <script language="javascript" src="/static/js/Base.js"></script>
    <link rel="stylesheet" href="/static/font-awesome/6.4.0/css/all.min.css">
    
    <style type="text/css">
        :root {
            /* 1. 全局字体属性（核心修复：恢复font-family-base，避免空值） */
            --font-family-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Microsoft YaHei', sans-serif;
            --font-size-base: 16px;
            --font-size-sm: 14px;
            --font-size-xs: 12px;
            --line-height-base: 1.5;
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;

            /* 2. 主题颜色（保留原有，新增登录相关颜色适配） */
            --dark-bg: #1a1a1a;
            --dark-card: #242424;
            --dark-border: #333;
            --dark-text: #e0e0e0;
            --dark-text-secondary: #a0a0a0;
            --light-bg: #ffffff;
            --light-card: #f8f9fa;
            --light-border: #e9ecef;
            --light-text: #333333;
            --light-text-secondary: #6c757d;
            
            --accent-color: #1E9FFF;
            --accent-color-hover: #2196f3;
            --danger-color: #dc3545; /* 退出按钮颜色 */
            --success-color: #28a745; /* 登录成功相关 */

            /* 3. 登录/退出元素颜色（深浅色适配） */
            --login-btn-bg: var(--accent-color);
            --login-btn-text: #ffffff;
            --login-btn-hover: var(--accent-color-hover);
            --logout-btn-text: var(--light-text);
            --logout-btn-hover-bg: #e9ecef;
            --dark-logout-btn-text: var(--dark-text);
            --dark-logout-btn-hover-bg: #343a40;
            --user-info-text: var(--light-text);
            --dark-user-info-text: var(--dark-text);
        }

        /* 全局样式：核心修复——排除Font Awesome图标元素的字体强制覆盖 */
        *:not([class*="fa-"]):not(.fa):not(.fas):not(.far):not(.fab) {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family-base) !important;
            font-size: var(--font-size-base);
            line-height: var(--line-height-base);
            font-weight: var(--font-weight-normal);
        }

        /* 单独给Font Awesome图标设置正确的字体（关键修复） */
        [class*="fa-"], .fa, .fas, .far, .fab {
            font-family: "Font Awesome 6 Free" !important;
            font-weight: 900 !important; /* Solid样式需要900权重 */
            font-style: normal;
            font-variant: normal;
            text-rendering: auto;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            padding-top: 60px; /* 顶部导航高度 */
            background-color: var(--light-bg);
            color: var(--light-text);
            z-index: 1;
        }

        /* 深色模式全局样式 */
        .dark body {
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }

        /* PC端：给侧边菜单留左侧空间 */
        @media (min-width: 768px) {
            body {
                padding-left: 64px;
            }
        }

        /* 移动端：无左侧padding */
        @media (max-width: 767px) {
            body {
                padding-left: 0;
            }
        }

        /* 纯CSS实现更多下拉菜单展开 */
        .more-dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
        }
        .more-dropdown:focus-within .more-dropdown-content,
        .more-dropdown:hover .more-dropdown-content {
            max-height: 200px;
        }
        .more-dropdown:focus-within .fa-angle-down,
        .more-dropdown:hover .fa-angle-down {
            transform: rotate(180deg);
            transition: transform 0.2s ease;
        }

        /* 下拉菜单过渡 */
        .dropdown-content {
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.2s ease;
            background-color: var(--light-card);
        }
        .dark .dropdown-content {
            background-color: var(--dark-card);
        }
        .dropdown:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* 主题切换按钮样式 */
        .theme-switch-btn {
            transition: all 0.2s ease;
            font-size: var(--font-size-sm);
        }
        .theme-switch-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        /* 关键修复：侧边菜单强制不透明背景 */
        .sidebar-menu {
            background-color: var(--light-card) !important;
            opacity: 1 !important;
            z-index: 50 !important;
        }
        .dark .sidebar-menu {
            background-color: var(--dark-card) !important;
        }

        /* 2. 登录/退出相关元素样式优化（核心：深浅色颜色反转适配） */
        /* 登录按钮 */
        .nav-user-login-btn {
            background-color: var(--login-btn-bg) !important;
            color: var(--login-btn-text) !important;
            font-size: var(--font-size-sm) !important;
            font-weight: var(--font-weight-medium) !important;
        }
        .nav-user-login-btn:hover {
            background-color: var(--login-btn-hover) !important;
        }
        .nav-user-login-btn i {
            color: inherit !important; /* 图标继承按钮文字颜色 */
            font-size: inherit !important;
        }

        /* 退出按钮 */
        .exit-login-btn {
            color: var(--logout-btn-text) !important;
            font-size: var(--font-size-sm) !important;
        }
        .exit-login-btn:hover {
            background-color: var(--logout-btn-hover-bg) !important;
        }
        .dark .exit-login-btn {
            color: var(--dark-logout-btn-text) !important;
        }
        .dark .exit-login-btn:hover {
            background-color: var(--dark-logout-btn-hover-bg) !important;
        }
        .exit-login-btn i {
            color: inherit !important;
            font-size: inherit !important;
        }

        /* 用户信息区域 */
        .nav-user-info a {
            color: var(--user-info-text) !important;
        }
        .dark .nav-user-info a {
            color: var(--dark-user-info-text) !important;
        }
        .nav-username {
            font-size: var(--font-size-sm) !important;
            font-weight: var(--font-weight-medium) !important;
        }
        .nav-user-info i {
            color: var(--light-text-secondary) !important;
            font-size: var(--font-size-xs) !important;
        }
        .dark .nav-user-info i {
            color: var(--dark-text-secondary) !important;
        }

        /* 用户下拉菜单选项 */
        .dropdown-content li a {
            color: var(--user-info-text) !important;
            font-size: var(--font-size-sm) !important;
        }
        .dark .dropdown-content li a {
            color: var(--dark-user-info-text) !important;
        }
        .dropdown-content li a:hover {
            background-color: var(--logout-btn-hover-bg) !important;
        }
        .dark .dropdown-content li a:hover {
            background-color: var(--dark-logout-btn-hover-bg) !important;
        }
        .dropdown-content li a i {
            color: inherit !important;
            font-size: inherit !important;
            margin-right: 8px !important;
        }

        /* 侧边菜单触发按钮 */
        .nav-menu-btn {
            color: var(--light-text) !important;
        }
        .dark .nav-menu-btn {
            color: var(--dark-text) !important;
        }
        .nav-menu-btn:hover {
            color: var(--accent-color) !important;
        }

        .hidden {
            display:none !important;
        }

        /* 辅助：小字体工具类 */
        .text-sm {
            font-size: var(--font-size-sm) !important;
        }
        .text-xs {
            font-size: var(--font-size-xs) !important;
        }
        .font-medium {
            font-weight: var(--font-weight-medium) !important;
        }
        .font-semibold {
            font-weight: var(--font-weight-semibold) !important;
        }
    </style>

        // 修复：Tailwind配置移除CSS变量，改用静态值（避免解析报错）

                    },
                    screens: {

                    }
                }
            }
        }
    </script>

</head>

    <script type="text/javascript">
        // 主题切换核心逻辑
        $(document).ready(function() {
            // 1. 初始化主题
            const initTheme = () => {
                const savedTheme = localStorage.getItem('site-theme') || 'auto';
                $('.theme-switch-btn').removeClass('active');
                $(`.theme-switch-btn[data-theme="${savedTheme}"]`).addClass('active');
                
                if (savedTheme === 'auto') {
                    const isSystemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    $('html').toggleClass('dark', isSystemDark);
                } else {
                    $('html').toggleClass('dark', savedTheme === 'dark');
                }
            };

            // 2. 主题切换按钮点击事件
            $('.theme-switch-btn').on('click', function() {
                const theme = $(this).data('theme');
                localStorage.setItem('site-theme', theme);
                initTheme();
            });

            // 3. 监听系统主题变化
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                if (localStorage.getItem('site-theme') === 'auto') {
                    initTheme();
                }
            });

            // 初始化主题
            initTheme();

            // 移动端侧边菜单逻辑
            const $sidebar = $('.sidebar-menu');
            const $overlay = $('.sidebar-overlay');
            const $menuBtn = $('.nav-menu-btn');
            const $closeBtn = $('.sidebar-close-btn');

            $menuBtn.on('click', function() {
                $sidebar.removeClass('-translate-x-full').addClass('translate-x-0');
                $overlay.removeClass('hidden');
                $('body').addClass('overflow-hidden');
            });

            function closeSidebar() {
                $sidebar.removeClass('translate-x-0').addClass('-translate-x-full');
                $overlay.addClass('hidden');
                $('body').removeClass('overflow-hidden');
            }
            $closeBtn.on('click', closeSidebar);
            $overlay.on('click', closeSidebar);

            
        });

        // 修复：增加Base对象容错，避免未定义时报错
        document.addEventListener("DOMContentLoaded", function() {
            // 初始化登录状态UI
            $('.nav-user-login-btn').removeClass('hidden');
            $('.exit-login-btn').addClass('hidden');
            $('.nav-user-info').addClass('hidden');

            // 容错：检查Base是否存在，避免报错
            if (typeof Base !== 'undefined' && Base.inst) {
                Base.inst().GetUserInfo();
            } else {
                console.warn('Base对象未定义，跳过用户信息获取');
            }
        });

        // 修复：监听消息时增加Base容错
        window.addEventListener('message', function(event) {
            // 容错：Base未定义时直接返回
            if (typeof Base === 'undefined' || !Base.inst) {
                console.warn('Base对象未定义，忽略消息：', event.data);
                return;
            }

            if (Base.inst().isLogined) {
                console.log("已登录，忽略消息");
                return;
            }
            switch (event.data.type) {
                case "TOKEN_ERROR":
                    if (Base.inst().BaseLogger) {
                        Base.inst().BaseLogger.debug(event.data.message);
                    }
                    break;
                case "SEND_LOGIN_TOKEN":
                    const app_id = event.data.app_id || null;
                    const encrypted_login_token = event.data.encrypted_login_token || null;
                    if (Base.inst().BaseLogger) {
                        Base.inst().BaseLogger.debug(`encrypted_login_token:${app_id},${encrypted_login_token}`);
                    }
                    Base.inst().GetUserInfo(app_id, encrypted_login_token);
                    $(".main-nav").addClass("hidden")
                    break;
            }
        });
    </script>
