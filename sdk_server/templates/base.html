<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 依赖引入 -->
    <script src="/static/js/jquery.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script language="javascript" src="/static/js/jsencrypt.min.js"></script>
    <script src="/static/js/socket.io.js"></script>
    <script language="javascript" src="/static/js/CommonUtils.js"></script>
    <script language="javascript" src="/static/js/LoggerManager.js"></script>
    <script language="javascript" src="/static/js/Base.js"></script>
    <link rel="stylesheet" href="/static/font-awesome/6.4.0/css/all.min.css">
    
    <style type="text/css">
        :root {
            /* 1. 全局字体属性 */
            --font-family-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Microsoft YaHei', sans-serif;
            --font-size-base: 16px;
            --font-size-sm: 14px;
            --font-size-xs: 12px;
            --line-height-base: 1.5;
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;

            /* 2. 主题颜色 */
            --dark-bg: #1a1a1a;
            --dark-card: #242424;
            --dark-border: #333;
            --dark-text: #e0e0e0;
            --dark-text-secondary: #a0a0a0;
            --light-bg: #ffffff;
            --light-card: #f8f9fa;
            --light-border: #e9ecef;
            --light-text: #333333;
            --light-text-secondary: #6c757d;
            
            --accent-color: #1E9FFF;
            --accent-color-hover: #2196f3;
            --danger-color: #dc3545; /* 退出按钮颜色 */
            --success-color: #28a745; /* 登录成功相关 */

            /* 3. 登录/退出元素颜色 */
            --login-btn-bg: var(--accent-color);
            --login-btn-text: #ffffff;
            --login-btn-hover: var(--accent-color-hover);
            --logout-btn-text: var(--light-text);
            --logout-btn-hover-bg: #e9ecef;
            --dark-logout-btn-text: var(--dark-text);
            --dark-logout-btn-hover-bg: #343a40;
            --user-info-text: var(--light-text);
            --dark-user-info-text: var(--dark-text);
        }

        /* 全局样式：应用统一字体属性 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family-base) !important;
            font-size: var(--font-size-base);
            line-height: var(--line-height-base);
            font-weight: var(--font-weight-normal);
        }
        video:fullscreen {
            object-fit: contain !important;
            background: black !important;
        }
        /* Font Awesome图标专属样式 */
        [class*="fa-"], .fa, .fas, .far, .fab {
            font-family: "Font Awesome 6 Free" !important;
            font-weight: 900 !important;
            font-style: normal;
            font-variant: normal;
            text-rendering: auto;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            background-color: var(--light-bg);
            color: var(--light-text);
            z-index: 1;
            /* 移除body的max-width，交给layout-container控制 */
        }



        /* 深色模式全局样式 */
        .dark body {
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }
        @media (min-width: 800px) {
            .layout-container {
                max-width: unset !important;
            }
        }


        /* 主内容区域（占满剩余宽度） */
        .main-content {
            display: flex;
            margin: 0 auto;
            flex: 1; /* 移动端/PC端都占剩余宽度 */
            padding-top: 50px; /* 匹配顶部导航高度 */
            padding-bottom: 50px;
            height: 100vh;
        }

        /* 移动端适配（<768px） */
        @media (max-width: 767px) {
            .sidebar-menu {
                width: 0; /* 移动端默认隐藏（宽度0） */
            }
            /* 移动端展开侧边栏时的遮罩（仅遮罩主内容） */
            .sidebar-overlay {
                position: absolute;
                top: 0;
                right: 0;
                bottom: 0;
                left: 0px;
                background: rgba(0,0,0,0.5);
                z-index: 3;
            }
        }

        /* PC端适配（≥768px） */
        @media (min-width: 768px) {
            /* PC端隐藏菜单按钮和关闭按钮 */
            .nav-menu-btn, .sidebar-close-btn {
                display: none !important;
            }
            /* PC端隐藏遮罩层 */
            .sidebar-overlay {
                display: none !important;
            }
        }

        /* 纯CSS实现更多下拉菜单展开 */
        .more-dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
        }
        .more-dropdown:focus-within .more-dropdown-content,
        .more-dropdown:hover .more-dropdown-content {
            max-height: 200px;
        }
        .more-dropdown:focus-within .fa-angle-down,
        .more-dropdown:hover .fa-angle-down {
            transform: rotate(180deg);
            transition: transform 0.2s ease;
        }

        /* 下拉菜单过渡 */
        .dropdown-content {
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.2s ease;
            background-color: var(--light-card);
        }
        .dark .dropdown-content {
            background-color: var(--dark-card);
        }
        .dropdown:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* 主题切换按钮样式 */
        .theme-switch-btn {
            transition: all 0.2s ease;
            font-size: var(--font-size-sm);
        }
        .theme-switch-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        /* 登录/退出相关元素样式 */
        .nav-user-login-btn {
            background-color: var(--login-btn-bg) !important;
            color: var(--login-btn-text) !important;
            font-size: var(--font-size-sm) !important;
            font-weight: var(--font-weight-medium) !important;
        }
        .nav-user-login-btn:hover {
            background-color: var(--login-btn-hover) !important;
        }
        .nav-user-login-btn i {
            color: inherit !important;
            font-size: inherit !important;
        }

        .exit-login-btn {
            color: var(--logout-btn-text) !important;
            font-size: var(--font-size-sm) !important;
        }
        .exit-login-btn:hover {
            background-color: var(--logout-btn-hover-bg) !important;
        }
        .dark .exit-login-btn {
            color: var(--dark-logout-btn-text) !important;
        }
        .dark .exit-login-btn:hover {
            background-color: var(--dark-logout-btn-hover-bg) !important;
        }
        .exit-login-btn i {
            color: inherit !important;
            font-size: inherit !important;
        }

        /* 用户信息区域 */
        .nav-user-info a {
            color: var(--user-info-text) !important;
        }
        .dark .nav-user-info a {
            color: var(--dark-user-info-text) !important;
        }
        .nav-username {
            font-size: var(--font-size-sm) !important;
            font-weight: var(--font-weight-medium) !important;
        }
        .nav-user-info i {
            color: var(--light-text-secondary) !important;
            font-size: var(--font-size-xs) !important;
        }
        .dark .nav-user-info i {
            color: var(--dark-text-secondary) !important;
        }

        /* 用户下拉菜单选项 */
        .dropdown-content li a {
            color: var(--user-info-text) !important;
            font-size: var(--font-size-sm) !important;
        }
        .dark .dropdown-content li a {
            color: var(--dark-user-info-text) !important;
        }
        .dropdown-content li a:hover {
            background-color: var(--logout-btn-hover-bg) !important;
        }
        .dark .dropdown-content li a:hover {
            background-color: var(--dark-logout-btn-hover-bg) !important;
        }
        .dropdown-content li a i {
            color: inherit !important;
            font-size: inherit !important;
            margin-right: 8px !important;
        }

        .hidden {
            display:none !important;
        }

        /* 辅助工具类 */
        .text-sm {
            font-size: var(--font-size-sm) !important;
        }
        .text-xs {
            font-size: var(--font-size-xs) !important;
        }
        .font-medium {
            font-weight: var(--font-weight-medium) !important;
        }
        .font-semibold {
            font-weight: var(--font-weight-semibold) !important;
        }
    </style>

    <script>
        tailwind.config = {
            mode: 'jit',
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'base': ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Microsoft YaHei', 'sans-serif'],
                    },
                    fontSize: {
                        'base': '16px',
                        'sm': '14px',
                        'xs': '12px',
                    },
                    lineHeight: {
                        'base': 1.5,
                    },
                    fontWeight: {
                        'normal': 400,
                        'medium': 500,
                        'semibold': 600,
                    },
                    colors: {
                        'dark-card': '#242424',
                        'dark-border': '#333',
                        'light-card': '#f8f9fa',
                        'light-border': '#e9ecef',
                        'accent-color': '#1E9FFF',
                        'hover-color': '#2196f3',
                    },
                    screens: {
                        sm: '640px',
                        md: '768px',
                        lg: '1024px',
                    }
                }
            }
        }
    </script>
    {% block head %}{% endblock %}
</head>

                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    
    <!-- 主内容区域（新增容器，占满剩余宽度） -->
        <div class="main-content">


            {% block header %}{% endblock %}
            {% block content %}{% endblock %}

        </div>

    
    {% block footer %}{% endblock %}
  
    <nav
    class="bottom_nav bg-white dark:bg-dark-card fixed bottom-0 left-0 right-0 z-50

    >
    <!-- 房间 -->
    <a href="#"
        class="room_list_btn flex flex-col items-center justify-center text-primary" data-page-id="room_list">

    <script>

        document.addEventListener("DOMContentLoaded", function() {
            // 初始化登录状态UI
            $('.nav-user-login-btn').removeClass('hidden');
            $('.exit-login-btn').addClass('hidden');
            $('.nav-user-info').addClass('hidden');

            if (typeof Base !== 'undefined' && Base.inst) {
                Base.inst().GetUserInfo();
            } else {
                console.warn('Base对象未定义，跳过用户信息获取');
            }
        });
    </script>
