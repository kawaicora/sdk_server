    <script type="text/javascript">
        // 移除layui初始化代码（已替换为Tailwind）

        // 监听父页面发来的消息（仅接收参数，不本地存Cookie）
        window.addEventListener('message', function(event) {
            if (Base.inst().isLogined){
                console.log("已登录，忽略消息");
                return;
            }
            switch (event.data.type){
                case "TOKEN_ERROR": {
                    Base.inst().BaseLogger.debug(event.data.message);
                };
                break;
                case "SEND_LOGIN_TOKEN":{
                    const app_id = event.data.app_id || null;
                    const encrypted_login_token = event.data.encrypted_login_token || null;
                    Base.inst().BaseLogger.debug(`encrypted_login_token:${app_id},${encrypted_login_token}`);
                    // 传递参数，让接口请求携带Cookie
                    Base.inst().GetUserInfo(app_id, encrypted_login_token);
                    $(".main-nav").addClass("hidden")
                };
                break;
            }
        });

        function checkScreenSize() {

            var $mainNav = $('.main-nav');
            var $navSwitch = $('.nav-switch');
            var $mobileNav = $('.mobile-nav');
            var $exitLogin = $('.exit-login-btn');
            var $navLogin = $('.nav-user-login-btn');
            var $navUser = $('.nav-user-info');

            // if (isMobile) {

            //     $exitLogin.addClass('hidden');
            //     // 重置移动端导航位置

            // } else {
            //     // PC端：隐藏开关，显示PC端退出按钮（仅未登录时）
            //     $navSwitch.addClass('hidden');
            //     $mobileNav.css('transform', '-translate-x-full');
            //     if ($navLogin.hasClass('hidden') && $navUser.hasClass('hidden')) {
            //         $exitLogin.removeClass('hidden');
            //     }
            // }
        }

        // 导航开关点击事件（手机端展开/收起）
        $('.nav-switch').on('click', function() {
            var $mobileNav = $('.mobile-nav');
            var isHidden = $mobileNav.css('transform').includes('-translate-x-full');
            $mobileNav.css('transform', isHidden ? 'translate-x-0' : '-translate-x-full');
        });

        document.addEventListener("DOMContentLoaded", function() {
            Base.inst().GetUserInfo();
            // 初始化与窗口 resize 监听
            checkScreenSize();
            $(window).resize(checkScreenSize);
        });
    </script>
