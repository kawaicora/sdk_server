<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 引入 layui 样式 -->
    <link rel="stylesheet" href="/static/layui-v2.6.8/layui/css/layui.css">
    <script src="/static/js/jquery.min.js"></script>
    <!-- 引入 layui JS -->
    <script src="/static/layui-v2.6.8/layui/layui.js"></script>
    <!-- 进入加密解密库 -->
    <script language="javascript" src="/static/js/jsencrypt.min.js"></script>
    <!-- 引入 socket.io 客户端库 -->
    <script src="/static/js/socket.io.js"></script>
    <script language="javascript" src="/static/js/CommonUtils.js"></script>
    <script language="javascript" src="/static/js/LoggerManager.js"></script>
    <script language="javascript" src="/static/js/Base.js"></script>

    <style type="text/css">
        :root {
            --dark-bg: #1a1a1a;
            --dark-card: #242424;
            --dark-border: #333;
            --dark-text: #e0e0e0;
            --accent-color: #1E9FFF;
            --hover-color: #2196f3;
        }

        body {
            min-height: 100vh;
            background-color: var(--dark-bg);
            color: var(--dark-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif !important;
            padding-top: 60px; /* 给固定导航栏留空间 */
        }

        /* 仅保留必要的导航栏基础适配样式，其余用Layui原生 */
        .main-nav {
            position: fixed !important;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background-color: var(--dark-card) !important;
        }

        .nav-switch {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        /* 手机端导航栏适配 */
        @media (max-width: 768px) {
            .layui-nav-itemed .layui-nav-child {
                background-color: var(--dark-card) !important;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>
    <!-- 移动端导航开关（Layui原生图标+按钮样式） -->
    <button class="layui-btn layui-btn-primary nav-switch hidden" style="width: 40px; height: 40px; padding: 0;">
        <i class="layui-icon layui-icon-align-left" style="font-size: 24px;"></i>
    </button>

    <!-- 导航栏：完全使用Layui原生导航组件 -->
    <ul class="layui-nav main-nav layui-nav-tree" lay-filter="mainNav">
        <!-- 左侧导航组 -->
        <li class="layui-nav-item layui-nav-logo">
            <a href="/">
                <img src="/static/img/favicon.ico" style="height: 40px; width: auto;">
            </a>
        </li>
        <li class="layui-nav-item">
            <a href="/view/webrtc">连线</a>
        </li>
        <li class="layui-nav-item">
            <a href="/view/chat">聊天</a>
        </li>
        <!-- 商品列表导航项 -->
        <li class="layui-nav-item">
            <a href="/view/products">商品列表</a>
        </li>

        <!-- 右侧用户相关（通过layui-nav-right实现右对齐） -->
        <li class="layui-nav-item layui-nav-right exit-login-btn hidden">
            <a href="javascript:Base.inst().Logout()">退出</a>
        </li>
        <li class="layui-nav-item layui-nav-right nav-user-login-btn hidden">
            <a href="/?page_id=8" class="layui-btn layui-btn-normal layui-btn-sm nav-user-login-btn">登录</a>
        </li>
        <li class="layui-nav-item layui-nav-right nav-user-info hidden" lay-unselect>
            <!-- 登录后显示：头像+用户名（Layui原生nav-img样式） -->
            <a href="javascript:;">
                <img src="/static/img/default_avatar.gif" class="layui-nav-img" style="height: 40px; width: 40px;">
                <span class="nav-username"></span>
            </a>
            <!-- 下拉菜单（Layui原生子导航） -->
            <dl class="layui-nav-child">
                <dd>
                    <a href="https://kawaimoe.org/?page_id=12" target="_blank">
                        <i class="layui-icon layui-icon-user"></i> 会员中心
                    </a>
                </dd>
                <dd>
                    <a href="/wp-login.php?action=logout&amp;redirect_to=https%3A%2F%2Fkawaimoe.org&amp;_wpnonce=a2e58cc712">
                        <i class="layui-icon layui-icon-logout"></i> 退出登录
                    </a>
                </dd>
            </dl>
        </li>
    </ul>

    {% block header %}{% endblock %}
    {% block content %}{% endblock %}
    {% block footer %}{% endblock %}

    <script type="text/javascript">
        // 初始化Layui导航组件
        layui.use('element', function() {
            var element = layui.element;
        });

        // 监听父页面发来的消息（保留原功能）
        window.addEventListener('message', function(event) {
            if (event.origin !== 'https://www.sakuraxy.top') {
                return;
            }
            if (event.data.type === 'SET_TICKET') {
                console.log('iframe_ticket已设置：', event.data.ticket);
                $.ajax({
                    url: `/api/third_get_cookies?ticket=${event.data.ticket}`,
                    type: "GET",
                    contentType: "application/json",
                    success: function(response) {
                        if (response.retcode != 0) {
                            Base.inst().BaseLogger.debug(`更新cookies失败!`);
                            return;
                        }
                        Base.inst().BaseLogger.debug(`更新cookies成功!`);
                        Base.inst().GetUserInfo();
                    },
                    error: function(xhr, status, error) {
                        Base.inst().BaseLogger.error(`请求失败 ${JSON.stringify(error, null, 2)}`);
                    }
                });
            }
        });

        // 屏幕尺寸适配（保留原逻辑，适配Layui导航样式）
        function checkScreenSize() {
            var isMobile = window.matchMedia("(max-width: 768px)").matches;
            var $mainNav = $('.main-nav');
            var $navSwitch = $('.nav-switch');
            var $exitLogin = $('.exit-login-btn');
            var $navLogin = $('.nav-user-login-btn');
            var $navUser = $('.nav-user-info');

            if (isMobile) {
                // 手机端：导航树折叠，显示开关
                $mainNav.addClass('layui-nav-tree').css({
                    'position': 'absolute',
                    'height': '100vh',
                    'width': '240px',
                    'left': '-240px',
                    'transition': 'left 0.3s'
                });
                $navSwitch.removeClass('hidden');
                // 隐藏右侧退出按钮（移到用户下拉菜单）
                $exitLogin.addClass('hidden');
                // 登录/用户信息按钮自适应
                $navLogin.css('margin-right', '60px');
                $navUser.css('margin-right', '60px');
            } else {
                // PC端：导航横向展开，隐藏开关
                $mainNav.removeClass('layui-nav-tree').css({
                    'position': 'fixed',
                    'height': '60px',
                    'width': '100%',
                    'left': '0'
                });
                $navSwitch.addClass('hidden');
                // 显示右侧退出按钮（仅未登录时）
                if ($navLogin.hasClass('hidden') && $navUser.hasClass('hidden')) {
                    $exitLogin.removeClass('hidden');
                }
                // 恢复默认边距
                $navLogin.css('margin-right', '0');
                $navUser.css('margin-right', '0');
            }
        }

        // 导航开关点击事件（手机端展开/收起）
        $('.nav-switch').on('click', function() {
            var $mainNav = $('.main-nav');
            var isHidden = $mainNav.css('left') === '-240px';
            $mainNav.css('left', isHidden ? '0' : '-240px');
        });

        // 初始化与窗口 resize 监听
        checkScreenSize();
        $(window).resize(checkScreenSize);
    </script>
</body>

</html>
